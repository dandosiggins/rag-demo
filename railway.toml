[build]
builder = "NIXPACKS"
installCommand = "pnpm install --no-frozen-lockfile"
buildCommand = "PORT=3000 BASE_PATH=/ pnpm --filter @workspace/rag-demo build && pnpm --filter @workspace/api-server build"

[deploy]
startCommand = "pnpm --filter @workspace/db push && node --enable-source-maps ./artifacts/api-server/dist/index.mjs"