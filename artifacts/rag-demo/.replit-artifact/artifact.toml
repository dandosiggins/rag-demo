kind = "web"
previewPath = "/"
title = "RAG Demo"
version = "1.0.0"
id = "artifacts/rag-demo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23613

[services.development]
run = "pnpm --filter @workspace/rag-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rag-demo", "run", "build" ]
publicDir = "artifacts/rag-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23613"
BASE_PATH = "/"
